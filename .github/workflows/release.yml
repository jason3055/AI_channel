name: Release

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  verify:
    name: Verify Rust workspace
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run tests
        run: cargo test --workspace

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  build:
    name: Build ${{ matrix.target }}
    needs: verify
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release -p aichan --locked --target "${{ matrix.target }}"

      - name: Package release archive
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          asset="aichan-${version}-${{ matrix.target }}.tar.gz"
          mkdir -p "pkg/${asset%.tar.gz}" dist
          cp "target/${{ matrix.target }}/release/aichan" "pkg/${asset%.tar.gz}/aichan"
          chmod 0755 "pkg/${asset%.tar.gz}/aichan"
          tar -C "pkg/${asset%.tar.gz}" -czf "dist/${asset}" aichan
          printf '%s\n' "asset=${asset}" >> "${GITHUB_OUTPUT}"

      - name: Upload release archive
        uses: actions/upload-artifact@v4
        with:
          name: aichan-${{ matrix.target }}
          path: dist/*.tar.gz
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download release archives
        uses: actions/download-artifact@v4
        with:
          path: downloaded

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          find downloaded -type f -name '*.tar.gz' -exec cp {} release/ \;
          (cd release && sha256sum *.tar.gz > SHA256SUMS)
          cat > release/VERIFY.md <<'VERIFY'
          # Verify AI Channel Release Assets

          ```bash
          sha256sum -c SHA256SUMS --ignore-missing
          gh attestation verify <asset>.tar.gz \
            --repo aftershower/AI_channel \
            --signer-workflow aftershower/AI_channel/.github/workflows/release.yml
          ```

          `aichan upgrade` verifies `SHA256SUMS` automatically before installing a release binary.
          VERIFY
          ls -la release

      - name: Attest release assets
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: release/*

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" release/* --verify-tag --title "${GITHUB_REF_NAME}" --generate-notes

name: CI and Cloud Run deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: main-deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Verify Rust workspace
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run tests
        run: cargo test --workspace

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  deploy:
    name: Deploy Cloud Run
    needs: verify
    if: ${{ vars.PAUSE_CLOUD_RUN_DEPLOY != 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      REGION: ${{ vars.GCP_REGION }}
      SERVICE: ${{ vars.GCP_SERVICE }}
      AR_REPO: ${{ vars.GCP_AR_REPO }}
      RUNTIME_SERVICE_ACCOUNT: ${{ vars.GCP_RUNTIME_SERVICE_ACCOUNT }}
      DEPLOY_SERVICE_ACCOUNT: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}
      WIF_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      IMAGE: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_AR_REPO }}/${{ vars.GCP_SERVICE }}:${{ github.sha }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check deploy readiness
        id: readiness
        run: |
          if test -f Dockerfile; then
            echo "ready=true" >> "${GITHUB_OUTPUT}"
          else
            echo "ready=false" >> "${GITHUB_OUTPUT}"
            echo "::notice::Cloud Run deploy skipped because Dockerfile is not present yet."
          fi

      - name: Check deploy prerequisites
        id: prereqs
        if: ${{ steps.readiness.outputs.ready == 'true' }}
        run: |
          missing=""
          for name in PROJECT_ID REGION SERVICE AR_REPO RUNTIME_SERVICE_ACCOUNT DEPLOY_SERVICE_ACCOUNT WIF_PROVIDER; do
            value="$(eval "printf '%s' \"\${${name}}\"")"
            if test -z "${value}"; then
              missing="${missing} ${name}"
            fi
          done
          if test -n "${missing}"; then
            echo "ready=false" >> "${GITHUB_OUTPUT}"
            echo "::notice::Cloud Run deploy skipped because these repository variables are missing:${missing}"
          else
            echo "ready=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Authenticate to Google Cloud
        if: ${{ steps.readiness.outputs.ready == 'true' && steps.prereqs.outputs.ready == 'true' }}
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.DEPLOY_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        if: ${{ steps.readiness.outputs.ready == 'true' && steps.prereqs.outputs.ready == 'true' }}
        uses: google-github-actions/setup-gcloud@v3

      - name: Build container image
        if: ${{ steps.readiness.outputs.ready == 'true' && steps.prereqs.outputs.ready == 'true' }}
        run: gcloud builds submit --region="${REGION}" --tag="${IMAGE}" .

      - name: Deploy to Cloud Run
        if: ${{ steps.readiness.outputs.ready == 'true' && steps.prereqs.outputs.ready == 'true' }}
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          project_id: ${{ env.PROJECT_ID }}
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE }}
          env_vars: |-
            AICHAN_FIRESTORE_DATABASE=(default)
            AICHAN_PUBLIC_BASE_URL=${{ vars.AICHAN_PUBLIC_BASE_URL }}
            AICHAN_READ_RATE_PER_MINUTE=120
            AICHAN_WRITE_RATE_PER_MINUTE=20
            AICHAN_MAX_BODY_BYTES=65536
          env_vars_update_strategy: merge
          flags: |-
            --service-account=${{ env.RUNTIME_SERVICE_ACCOUNT }}
            --min-instances=0
            --max-instances=3
            --timeout=15s

      - name: Smoke test health endpoint
        if: ${{ steps.readiness.outputs.ready == 'true' && steps.prereqs.outputs.ready == 'true' }}
        run: curl -fsS "${{ steps.deploy.outputs.url }}/health"
